<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 570" width="860" height="570" role="img" aria-label="Staged de-risking: two axes — task-difficulty emergence within a stage, and distinct meta-capabilities across stages">
  <style>
    .title    { font: 700 16px "DejaVu Sans","Liberation Sans","Helvetica Neue",Arial,sans-serif; fill:#1f2328; text-anchor:middle; }
    .subtitle { font: 400 12px "DejaVu Sans","Liberation Sans","Helvetica Neue",Arial,sans-serif; fill:#5b6770; text-anchor:middle; }
    .panelhdr { font: 700 13px "DejaVu Sans","Liberation Sans","Helvetica Neue",Arial,sans-serif; fill:#1f2328; text-anchor:start; }
    .panelsub { font: 400 11.5px "DejaVu Sans","Liberation Sans","Helvetica Neue",Arial,sans-serif; fill:#5b6770; text-anchor:start; }

    .axisline { stroke:#5b6770; stroke-width:1; fill:none; }
    .tick     { stroke:#5b6770; stroke-width:1; }
    .axislbl  { font: 400 10.5px "DejaVu Sans","Liberation Sans","Helvetica Neue",Arial,sans-serif; fill:#3a4148; text-anchor:middle; }
    .yend     { font: 400 10.5px "DejaVu Sans","Liberation Sans","Helvetica Neue",Arial,sans-serif; fill:#6b7480; text-anchor:end; }
    .yaxistitle { font: 400 11px "DejaVu Sans","Liberation Sans","Helvetica Neue",Arial,sans-serif; fill:#5b6770; text-anchor:middle; }

    .curvelbl { font: 400 11px "DejaVu Sans","Liberation Sans","Helvetica Neue",Arial,sans-serif; text-anchor:start; }
    .loss     { fill:none; stroke:#8a95a2; stroke-width:1.7; stroke-dasharray:5,4; stroke-linecap:round; }
    .easy     { fill:none; stroke:#d68d2e; stroke-width:2.3; stroke-linejoin:round; stroke-linecap:round; }
    .med      { fill:none; stroke:#b8552a; stroke-width:2.3; stroke-linejoin:round; stroke-linecap:round; }
    .hard     { fill:none; stroke:#7a3d68; stroke-width:2.3; stroke-linejoin:round; stroke-linecap:round; }
    .easyfill { fill:#a56a1a; }
    .medfill  { fill:#8a3f1a; }
    .hardfill { fill:#5b2942; }
    .lossfill { fill:#5b6770; }

    .stagebg1 { fill:#eaf6ea; stroke:#c4dcc8; stroke-width:1; }
    .stagebg2 { fill:#e4f0f0; stroke:#bacdcd; stroke-width:1; }
    .stagebg3 { fill:#e4ecf6; stroke:#bfcbdf; stroke-width:1; }
    .stagenum { font: 700 15px "DejaVu Sans","Liberation Sans","Helvetica Neue",Arial,sans-serif; fill:#1f2328; text-anchor:middle; }
    .stagetag { font: italic 400 11px "DejaVu Sans","Liberation Sans","Helvetica Neue",Arial,sans-serif; fill:#5b6770; text-anchor:middle; }
    .stagediv { stroke:#c9d0d6; stroke-width:1; }
    .sectlbl  { font: 700 10px "DejaVu Sans","Liberation Sans","Helvetica Neue",Arial,sans-serif; fill:#6b7480; text-anchor:middle; letter-spacing: 0.08em; }
    .scale    { font: 400 11.5px "DejaVu Sans","Liberation Sans","Helvetica Neue",Arial,sans-serif; fill:#3a4148; text-anchor:middle; }
    .metacap1 { font: 700 13px "DejaVu Sans","Liberation Sans","Helvetica Neue",Arial,sans-serif; fill:#276b4d; text-anchor:middle; }
    .metacap2 { font: 700 13px "DejaVu Sans","Liberation Sans","Helvetica Neue",Arial,sans-serif; fill:#275970; text-anchor:middle; }
    .metacap3 { font: 700 13px "DejaVu Sans","Liberation Sans","Helvetica Neue",Arial,sans-serif; fill:#274670; text-anchor:middle; }
    .metadesc { font: 400 11px "DejaVu Sans","Liberation Sans","Helvetica Neue",Arial,sans-serif; fill:#3a4148; text-anchor:middle; }

    .arrow     { fill:none; stroke:#5b6770; stroke-width:1.6; }
    .arrowhead { fill:#5b6770; stroke:none; }
    .arrowlbl  { font: 700 11px "DejaVu Sans","Liberation Sans","Helvetica Neue",Arial,sans-serif; fill:#3a4148; text-anchor:middle; }
    .arrowsub  { font: italic 400 10px "DejaVu Sans","Liberation Sans","Helvetica Neue",Arial,sans-serif; fill:#6b7480; text-anchor:middle; }
  </style>

  <!-- ================= Overall title ================= -->
  <text class="title"    x="430" y="22">Staged de-risking: two orthogonal axes</text>
  <text class="subtitle" x="430" y="40">Within each stage, a task-difficulty spectrum emerges. Across stages, we check a distinct meta-capability.</text>

  <!-- ================= Top panel: within-stage emergence ================= -->
  <text class="panelhdr" x="60" y="72">Within a stage · task-difficulty spectrum turns on</text>
  <text class="panelsub" x="60" y="88">Easy tasks emerge first, then medium; hard tasks only start to move. Aggregate held-out loss stays smooth throughout.</text>

  <!-- Y-axis end labels & title -->
  <text class="yend" x="86" y="108">strong</text>
  <text class="yend" x="86" y="236">no signal</text>
  <text class="yaxistitle" transform="translate(48,175) rotate(-90)" x="0" y="0">downstream capability</text>

  <!-- Plot area x=90..720, y=100..238 -->

  <!-- Curves -->
  <!-- Held-out loss: smooth descent, dashed gray -->
  <path class="loss" d="M 90,115 C 280,175 480,215 720,232"/>
  <!-- Easy tasks: emerge early -->
  <path class="easy" d="M 90,228 C 160,228 190,120 285,120 L 720,120"/>
  <!-- Medium tasks: emerge mid -->
  <path class="med"  d="M 90,232 L 240,230 C 360,230 395,145 490,145 L 720,145"/>
  <!-- Hard tasks: only start to move at end -->
  <path class="hard" d="M 90,234 L 470,233 C 590,233 630,205 720,188"/>

  <!-- Curve labels (right end) -->
  <text class="curvelbl easyfill" x="726" y="122">easy tasks</text>
  <text class="curvelbl medfill"  x="726" y="148">medium tasks</text>
  <text class="curvelbl hardfill" x="726" y="190">hard tasks</text>
  <text class="curvelbl lossfill" x="726" y="234">held-out loss ↓</text>

  <!-- X-axis -->
  <line class="axisline" x1="90"  y1="238" x2="720" y2="238"/>
  <line class="tick"     x1="90"  y1="238" x2="90"  y2="243"/>
  <line class="tick"     x1="720" y1="238" x2="720" y2="243"/>
  <text class="axislbl"  x="405" y="257">training compute within stage (log)</text>

  <!-- ================= Bottom panel: cross-stage meta-capabilities ================= -->
  <text class="panelhdr" x="60" y="296">Across stages · each stage tests a distinct meta-capability</text>
  <text class="panelsub" x="60" y="312">Every stage runs the emergence story above on that stage's tasks; each transition escalates scale and asks a new question.</text>

  <!-- Stage boxes: y=328..548 (height 220).  Widths 210, gaps 55: 60..270, 325..535, 590..800 -->
  <rect class="stagebg1" x="60"  y="328" width="210" height="220" rx="6"/>
  <rect class="stagebg2" x="325" y="328" width="210" height="220" rx="6"/>
  <rect class="stagebg3" x="590" y="328" width="210" height="220" rx="6"/>

  <!-- ========== Stage 1 box ========== -->
  <text class="stagenum" x="165" y="353">Stage 1</text>
  <text class="stagetag" x="165" y="370">≈ GPT-1</text>
  <line class="stagediv" x1="80"  y1="384" x2="250" y2="384"/>

  <text class="sectlbl"   x="165" y="401">SCALE</text>
  <text class="scale"     x="165" y="420">1 task at a time</text>
  <text class="scale"     x="165" y="437">~10k seq · ~1–8B params</text>
  <line class="stagediv"  x1="80"  y1="452" x2="250" y2="452"/>

  <text class="sectlbl"   x="165" y="469">META-CAPABILITY CHECKED</text>
  <text class="metacap1"  x="165" y="491">In-domain learning works</text>
  <text class="metadesc"  x="165" y="512">Mid-training on one task</text>
  <text class="metadesc"  x="165" y="527">produces the emergence</text>
  <text class="metadesc"  x="165" y="542">curves shown above.</text>

  <!-- ========== Stage 2 box ========== -->
  <text class="stagenum" x="430" y="353">Stage 2</text>
  <text class="stagetag" x="430" y="370">≈ GPT-2</text>
  <line class="stagediv" x1="345" y1="384" x2="515" y2="384"/>

  <text class="sectlbl"   x="430" y="401">SCALE</text>
  <text class="scale"     x="430" y="420">~100 tasks jointly</text>
  <text class="scale"     x="430" y="437">~100k seq · ~8–30B params</text>
  <line class="stagediv"  x1="345" y1="452" x2="515" y2="452"/>

  <text class="sectlbl"   x="430" y="469">META-CAPABILITY CHECKED</text>
  <text class="metacap2"  x="430" y="491">Positive cross-task transfer</text>
  <text class="metadesc"  x="430" y="512">Joint mid-train + fine-tune</text>
  <text class="metadesc"  x="430" y="527">on any one task beats</text>
  <text class="metadesc"  x="430" y="542">Stage 1's in-domain result.</text>

  <!-- ========== Stage 3 box ========== -->
  <text class="stagenum" x="695" y="353">Stage 3</text>
  <text class="stagetag" x="695" y="370">≈ GPT-3</text>
  <line class="stagediv" x1="610" y1="384" x2="780" y2="384"/>

  <text class="sectlbl"   x="695" y="401">SCALE</text>
  <text class="scale"     x="695" y="420">distribution over tasks</text>
  <text class="scale"     x="695" y="437">~1M–10M seq · ~30–100B</text>
  <line class="stagediv"  x1="610" y1="452" x2="780" y2="452"/>

  <text class="sectlbl"   x="695" y="469">META-CAPABILITY CHECKED</text>
  <text class="metacap3"  x="695" y="491">Zero-shot transfer</text>
  <text class="metadesc"  x="695" y="512">Without fine-tuning, new</text>
  <text class="metadesc"  x="695" y="527">tasks beat Stage 1's</text>
  <text class="metadesc"  x="695" y="542">in-domain elicitation results.</text>

  <!-- ========== Arrows between stages (mid-box, y=442) ========== -->
  <!-- Arrow 1 → 2 (gap 270..325, center 297.5) -->
  <text class="arrowlbl" x="297.5" y="430">×10</text>
  <line class="arrow"      x1="278" y1="442" x2="316" y2="442"/>
  <polygon class="arrowhead" points="316,438 322,442 316,446"/>
  <text class="arrowsub" x="297.5" y="458">add joint</text>

  <!-- Arrow 2 → 3 (gap 535..590, center 562.5) -->
  <text class="arrowlbl" x="562.5" y="430">×10–100</text>
  <line class="arrow"      x1="543" y1="442" x2="581" y2="442"/>
  <polygon class="arrowhead" points="581,438 587,442 581,446"/>
  <text class="arrowsub" x="562.5" y="458">drop fine-tune</text>
</svg>
